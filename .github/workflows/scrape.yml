name: scrape

on:
  schedule:
    # 02:30 UTC daily = 05:30 EAT (Nairobi). Stores are quiet, fresh diff each morning.
    - cron: "30 2 * * *"
  workflow_dispatch: {}   # manual "Run scrape now" button in the Actions UI

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit data
        run: |
          git config user.name "scraper-bot"
          git config user.email "scraper-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
